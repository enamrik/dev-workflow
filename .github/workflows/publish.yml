name: Publish Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (do not actually publish)'
        required: false
        type: boolean
        default: false

jobs:
  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Pack CLI
        working-directory: apps/cli
        run: |
          npm pack
          mv *.tgz dev-workflow-cli.tgz

      - name: Upload to Release
        if: ${{ github.event_name == 'release' && !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          files: apps/cli/dev-workflow-cli.tgz

      - name: Upload artifact (dry run or workflow_dispatch)
        if: ${{ inputs.dry_run || github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: dev-workflow-cli
          path: apps/cli/dev-workflow-cli.tgz
