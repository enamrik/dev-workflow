name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # Build a self-contained artifact per platform. better-sqlite3 is compiled natively on
  # each runner so its prebuilt binary matches the target; everything else is bundled.
  build:
    name: Build ${{ matrix.slug }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, slug: darwin-arm64 }
          - { os: ubuntu-latest, slug: linux-x64 }
          - { os: ubuntu-24.04-arm, slug: linux-arm64 }
          - { os: windows-latest, slug: windows-x64 }
          # darwin-x64 (Intel mac) omitted: the deprecated macos-13 runner queues
          # indefinitely and would block every release. Re-add when a reliable Intel
          # runner is available — the build itself is known-good.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build packages + static web export
        run: pnpm build
      - name: Bundle CLI + MCP server
        run: |
          pnpm --filter @dev-workflow/cli exec tsup
          pnpm --filter @dev-workflow/mcp-server exec tsup
      - name: Assemble artifact
        run: node scripts/assemble-artifact.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.slug }}
          path: dist-artifacts/dev-workflow-*
          if-no-files-found: error

  # Version + publish a GitHub Release with all platform artifacts attached.
  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Collect platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
