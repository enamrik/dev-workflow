name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs-site/**'
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

# Serialize releases: overlapping runs racing to upload assets to the same release
# corrupt them. Queue (don't cancel) so each run finishes its uploads cleanly.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Build a self-contained artifact per platform. better-sqlite3 is compiled natively on
  # each runner so its prebuilt binary matches the target; everything else is bundled.
  build:
    name: Build ${{ matrix.slug }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, slug: darwin-arm64 }
          - { os: macos-13, slug: darwin-x64 }
          - { os: ubuntu-latest, slug: linux-x64 }
          - { os: ubuntu-24.04-arm, slug: linux-arm64 }
          - { os: windows-latest, slug: windows-x64 }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build packages + static web export
        run: pnpm build
      - name: Bundle CLI + MCP server
        run: |
          pnpm --filter @dev-workflow/cli exec tsup
          pnpm --filter @dev-workflow/mcp-server exec tsup
      - name: Assemble artifact
        run: node scripts/assemble-artifact.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.slug }}
          path: dist-artifacts/dev-workflow-*
          if-no-files-found: error

  # Version + publish a GitHub Release with all platform artifacts attached.
  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Collect platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true
      - name: Record current release tag
        id: pre
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "tag=$(gh release view --json tagName -q .tagName 2>/dev/null || echo none)" >> "$GITHUB_OUTPUT"
      - name: Semantic Release (version + tag + notes; assets uploaded separately)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
      # Upload assets with the gh CLI rather than @semantic-release/github: the latter
      # intermittently corrupted the macOS asset on upload. gh upload is reliable, and we
      # re-download every asset to verify integrity (gzip/zip + sha) before trusting it.
      - name: Upload + verify release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NEW=$(gh release view --json tagName -q .tagName)
          if [ "$NEW" = "${{ steps.pre.outputs.tag }}" ]; then
            echo "No new release was created this run; nothing to upload."
            exit 0
          fi
          echo "Uploading assets to $NEW"
          gh release upload "$NEW" dist-artifacts/dev-workflow-* --clobber
          echo "Verifying uploaded assets..."
          tmp=$(mktemp -d)
          fail=0
          for f in dist-artifacts/dev-workflow-*.tar.gz dist-artifacts/dev-workflow-*.zip; do
            [ -e "$f" ] || continue
            name=$(basename "$f")
            rm -f "$tmp/$name" "$tmp/$name.sha256"
            gh release download "$NEW" -p "$name" -p "$name.sha256" -D "$tmp"
            case "$name" in
              *.tar.gz) gzip -t "$tmp/$name" || { echo "CORRUPT gzip: $name"; fail=1; continue; } ;;
              *.zip) unzip -tq "$tmp/$name" >/dev/null || { echo "CORRUPT zip: $name"; fail=1; continue; } ;;
            esac
            exp=$(awk '{print $1}' "$tmp/$name.sha256")
            act=$(sha256sum "$tmp/$name" | awk '{print $1}')
            if [ "$exp" != "$act" ]; then echo "SHA MISMATCH: $name"; fail=1; else echo "OK: $name"; fi
          done
          [ "$fail" -eq 0 ] || { echo "Release asset verification failed."; exit 1; }
