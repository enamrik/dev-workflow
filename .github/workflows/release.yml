name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs-site/**'
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

# Serialize releases so overlapping runs can't race-corrupt release assets.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Single runner builds the JS bundles + static SPA once, then assembles every platform's
  # artifact by fetching that platform's better-sqlite3 prebuild (the only native piece).
  # No per-OS matrix is needed — the app is pure JS/data otherwise.
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Compute next version (stamp into the bundle)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          # Dry-run semantic-release to learn the version it will publish, so the CLI bundle
          # self-reports it (tsup reads DFL_VERSION). The real release runs later and computes
          # the same version from the same commits.
          OUT=$(npx semantic-release --dry-run 2>&1 || true)
          VER=$(printf '%s\n' "$OUT" | grep -oiE 'next release version is [0-9]+\.[0-9]+\.[0-9]+' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [ -z "${VER:-}" ]; then
            # No releasable commits this run — fall back to the latest tag for the stamp.
            VER=$(git tag --sort=-v:refname | head -1 | sed 's/^v//')
            VER=${VER:-0.0.0}
          fi
          echo "Stamping version: $VER"
          echo "DFL_VERSION=$VER" >> "$GITHUB_ENV"
      - name: Build packages + static web export
        run: pnpm build
      - name: Bundle CLI + MCP server
        run: |
          pnpm --filter @dev-workflow/cli exec tsup
          pnpm --filter @dev-workflow/mcp-server exec tsup
      - name: Assemble all platform artifacts
        run: |
          for t in darwin-arm64 darwin-x64 linux-x64 linux-arm64 windows-x64 windows-arm64; do
            DFL_TARGET=$t node scripts/assemble-artifact.mjs
          done
      - name: Record current release tag
        id: pre
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "tag=$(gh release view --json tagName -q .tagName 2>/dev/null || echo none)" >> "$GITHUB_OUTPUT"
      - name: Semantic Release (version + tag + notes)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
      # Upload assets with the gh CLI (reliable) rather than @semantic-release/github, which
      # intermittently corrupted assets on upload; then re-download to verify every asset.
      - name: Upload + verify release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NEW=$(gh release view --json tagName -q .tagName)
          if [ "$NEW" = "${{ steps.pre.outputs.tag }}" ]; then
            echo "No new release created this run; nothing to upload."
            exit 0
          fi
          echo "Uploading assets to $NEW"
          gh release upload "$NEW" dist-artifacts/dev-workflow-* --clobber
          echo "Verifying uploaded assets..."
          tmp=$(mktemp -d)
          fail=0
          for f in dist-artifacts/dev-workflow-*.tar.gz dist-artifacts/dev-workflow-*.zip; do
            [ -e "$f" ] || continue
            name=$(basename "$f")
            rm -f "$tmp/$name" "$tmp/$name.sha256"
            gh release download "$NEW" -p "$name" -p "$name.sha256" -D "$tmp"
            case "$name" in
              *.tar.gz) gzip -t "$tmp/$name" || { echo "CORRUPT gzip: $name"; fail=1; continue; } ;;
              *.zip) unzip -tq "$tmp/$name" >/dev/null || { echo "CORRUPT zip: $name"; fail=1; continue; } ;;
            esac
            exp=$(awk '{print $1}' "$tmp/$name.sha256")
            act=$(sha256sum "$tmp/$name" | awk '{print $1}')
            if [ "$exp" != "$act" ]; then echo "SHA MISMATCH: $name"; fail=1; else echo "OK: $name"; fi
          done
          [ "$fail" -eq 0 ] || { echo "Release asset verification failed."; exit 1; }
